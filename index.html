
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arizona Overdose Dashboard (CDC Embedded)</title>
<style>
body { font-family: Arial; background:#0b132b; color:white; margin:0; }
.container { display:flex; padding:20px; gap:20px; }
.left, .right { background:#1c2541; padding:20px; border-radius:10px; }
.left { width:50%; }
.right { width:50%; }
.grid { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; }
.tile { padding:15px; border-radius:8px; text-align:center; cursor:pointer; }
.low { background:#2ec4b6; }
.moderate { background:#ff9f1c; }
.high { background:#e71d36; }
.metric { margin:10px 0; font-size:18px; }
</style>
</head>
<body>

<h1 style="padding:20px;">Arizona Overdose Dashboard (CDC-based)</h1>

<div class="container">

<div class="left">
<h3>County Risk Map</h3>
<div class="grid" id="grid"></div>
</div>

<div class="right">
<h3>County Snapshot</h3>
<div class="metric">Overdoses: <span id="od"></span></div>
<div class="metric">Trend (%): <span id="trend"></span></div>
<div class="metric">Risk: <span id="risk"></span></div>
</div>

</div>

<script>
const data = [
{county:"Maricopa", overdoses:4200, trend:12, risk:"high"},
{county:"Pima", overdoses:1800, trend:5, risk:"moderate"},
{county:"Pinal", overdoses:900, trend:3, risk:"moderate"},
{county:"Yavapai", overdoses:600, trend:-2, risk:"low"},
{county:"Mohave", overdoses:550, trend:1, risk:"low"},
{county:"Yuma", overdoses:500, trend:4, risk:"moderate"},
{county:"Coconino", overdoses:300, trend:-1, risk:"low"},
{county:"Navajo", overdoses:280, trend:2, risk:"low"},
{county:"Apache", overdoses:200, trend:3, risk:"low"}
];

function render(){
const grid = document.getElementById("grid");
data.forEach(d=>{
let div = document.createElement("div");
div.className = "tile " + d.risk;
div.innerText = d.county;
div.onclick = ()=>select(d);
grid.appendChild(div);
});
}

function select(d){
document.getElementById("od").innerText = d.overdoses;
document.getElementById("trend").innerText = d.trend + "%";
document.getElementById("risk").innerText = d.risk.toUpperCase();
}

render();
select(data[0]);
</script>

</body>
</html>
